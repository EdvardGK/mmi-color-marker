[theme]
primaryColor = "#2d4a3e"
backgroundColor = "#f5f5f0"
secondaryBackgroundColor = "#e8e4dc"
textColor = "#333333"

[server]
headless = true
# Hosted on Streamlit Community Cloud (~1 GB RAM). ifcopenshell holds the whole
# model in memory at ~6x the file size, so larger uploads OOM-kill the app.
maxUploadSize = 200
